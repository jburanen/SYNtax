server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"            always;
    add_header X-Content-Type-Options  "nosniff"               always;
    add_header X-XSS-Protection        "1; mode=block"         always;
    add_header Referrer-Policy         "no-referrer"           always;
    add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src ws: wss:;" always;

    # HTML pages: always revalidate so browsers pick up new ?v= asset URLs immediately.
    # A 304 Not Modified is returned when nothing changed, so this is cheap.
    add_header Cache-Control "no-cache, must-revalidate" always;

    # Static assets — revalidate just like HTML. A 304 is returned when the file
    # hasn't changed, so the overhead is one round-trip header exchange per asset.
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Themeable assets rendered from .env at container startup by
    # docker/40-syntax-config.sh. ^~ so this wins over the css|js
    # regex location above (which would look under the html root).
    location ^~ /generated/ {
        alias /usr/share/nginx/generated/;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # WebSocket-to-TCP proxy for MQTT client
    location /mqtt-proxy {
        proxy_pass         http://mqtt-proxy:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA-style fallback: return index.html for any unmatched path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access to dot files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    error_page 404 /index.html;
}
